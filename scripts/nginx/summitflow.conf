# SummitFlow - nginx reverse proxy configuration
# HTTPS on port 444, proxies to backend:8001 and frontend:3001

upstream summitflow_frontend {
    server 127.0.0.1:3001;
    keepalive 64;
}

upstream summitflow_backend {
    server 127.0.0.1:8001;
    keepalive 64;
}

server {
    # Bind to all interfaces on port 444 for local network access.
    # Restrict with firewall rules or change to a specific IP as needed.
    listen 0.0.0.0:444 ssl http2;
    listen 127.0.0.1:444 ssl http2;
    server_name localhost;

    # SSL certificates (reuse mkcert certs from portfolio-ai)
    ssl_certificate /etc/nginx/ssl/localhost.pem;
    ssl_certificate_key /etc/nginx/ssl/localhost-key.pem;

    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SummitFlowSSL:10m;
    ssl_session_tickets off;

    # Logging
    access_log /var/log/nginx/summitflow-access.log;
    error_log /var/log/nginx/summitflow-error.log;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # ===========================================
    # API routes → Backend (FastAPI on port 8001)
    # ===========================================
    location /api/ {
        proxy_pass http://summitflow_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 300s;

        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    # Health endpoint → Backend
    location /health {
        proxy_pass http://summitflow_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 30s;
    }

    # ===========================================
    # WebSocket for Next.js HMR (Hot Module Reload)
    # ===========================================
    location /turbopack-hmr {
        proxy_pass http://summitflow_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location /_next/webpack-hmr {
        proxy_pass http://summitflow_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ===========================================
    # Static files and pages → Frontend (Next.js on port 3001)
    # ===========================================
    location / {
        proxy_pass http://summitflow_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Next.js static assets
    location /_next/static {
        proxy_pass http://summitflow_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_valid 60m;
        add_header Cache-Control "public, immutable, max-age=31536000";
    }
}
