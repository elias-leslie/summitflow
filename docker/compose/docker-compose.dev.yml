# Development override — bind-mounts source code for hot reload
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml --profile summitflow up
#
# This overrides production images with local builds + volume mounts.

services:
  # ─── SummitFlow ──────────────────────────────────────────────────
  summitflow-api:
    build:
      context: ../../../summitflow
      dockerfile: docker/backend.Dockerfile
    volumes:
      - ../../../summitflow/backend/app:/app/app:cached
      - ../../../summitflow/backend/cli:/app/cli:cached
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8001", "--reload", "--reload-dir", "/app/app", "--reload-dir", "/app/cli"]
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      RUN_MIGRATIONS: "false"

  summitflow-web:
    build:
      context: ../../../summitflow
      dockerfile: docker/frontend.Dockerfile
      target: dev
    volumes:
      - ../../../summitflow/frontend/app:/app/app:cached
      - ../../../summitflow/frontend/components:/app/components:cached
      - ../../../summitflow/frontend/lib:/app/lib:cached
    command: ["pnpm", "dev", "--hostname", "0.0.0.0", "--port", "3001"]

  summitflow-worker:
    build:
      context: ../../../summitflow
      dockerfile: docker/backend.Dockerfile
    volumes:
      - ../../../summitflow/backend/app:/app/app:cached
      - ../../../summitflow/backend/cli:/app/cli:cached
    environment:
      PYTHONDONTWRITEBYTECODE: "1"

  # ─── Agent Hub ───────────────────────────────────────────────────
  agent-hub-api:
    build:
      context: ../../../agent-hub
      dockerfile: docker/backend.Dockerfile
    volumes:
      - ../../../agent-hub/backend/app:/app/app:cached
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8003", "--reload", "--reload-dir", "/app/app"]
    environment:
      PYTHONDONTWRITEBYTECODE: "1"

  agent-hub-web:
    build:
      context: ../../../agent-hub
      dockerfile: docker/frontend.Dockerfile
      target: dev
    volumes:
      - ../../../agent-hub/frontend/src:/app/src:cached
    command: ["pnpm", "dev", "--hostname", "0.0.0.0", "--port", "3003"]

  agent-hub-worker:
    build:
      context: ../../../agent-hub
      dockerfile: docker/backend.Dockerfile
    volumes:
      - ../../../agent-hub/backend/app:/app/app:cached
    environment:
      PYTHONDONTWRITEBYTECODE: "1"

  # ─── Terminal ────────────────────────────────────────────────────
  terminal-api:
    build:
      context: ../../../terminal
      dockerfile: docker/backend.Dockerfile
    volumes:
      - ../../../terminal/terminal:/app/terminal:cached
    command: ["uvicorn", "terminal.main:app", "--host", "0.0.0.0", "--port", "8002", "--reload", "--reload-dir", "/app/terminal"]
    environment:
      PYTHONDONTWRITEBYTECODE: "1"

  terminal-web:
    build:
      context: ../../../terminal
      dockerfile: docker/frontend.Dockerfile
      target: dev
    volumes:
      - ../../../terminal/frontend/app:/app/app:cached
      - ../../../terminal/frontend/components:/app/components:cached
    command: ["pnpm", "dev", "--hostname", "0.0.0.0", "--port", "3002"]
    # In dev mode terminal-api runs as a container (not on the host), so
    # drop the host-gateway alias and route via Docker network instead.
    extra_hosts: !reset []
    environment:
      API_URL: "http://terminal-api:8002"

  # ─── Portfolio AI ────────────────────────────────────────────────
  portfolio-api:
    build:
      context: ../../../portfolio-ai
      dockerfile: docker/backend.Dockerfile
    volumes:
      - ../../../portfolio-ai/backend/app:/app/app:cached
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--reload-dir", "/app/app"]
    environment:
      PYTHONDONTWRITEBYTECODE: "1"

  portfolio-web:
    build:
      context: ../../../portfolio-ai
      dockerfile: docker/frontend.Dockerfile
      target: dev
    volumes:
      - ../../../portfolio-ai/frontend/app:/app/app:cached
      - ../../../portfolio-ai/frontend/components:/app/components:cached
    command: ["pnpm", "dev", "--hostname", "0.0.0.0", "--port", "3000"]

  portfolio-worker:
    build:
      context: ../../../portfolio-ai
      dockerfile: docker/backend.Dockerfile
    volumes:
      - ../../../portfolio-ai/backend/app:/app/app:cached
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
