# SummitFlow Ecosystem Redis Configuration (Docker)
# Shared by: Portfolio (db 0), SummitFlow (db 1), Agent Hub (db 2)

# Network (Docker handles binding)
bind 0.0.0.0
port 6379
protected-mode no

# Data persistence
dir /data
dbfilename dump.rdb
appendonly yes
appendfilename "appendonly.aof"

# Memory
maxmemory 512mb
maxmemory-policy allkeys-lru

# Logging
loglevel notice
logfile ""

# Performance
tcp-keepalive 300
timeout 0
