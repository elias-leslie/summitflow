[pytest]
testpaths = tests
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests (require DB/network)
    e2e: marks tests as end-to-end tests

# Default options - skip slow tests by default (use -m slow to run them)
addopts =
    -v
    --tb=short
    --strict-markers
    -m "not slow"

# Coverage settings (when using --cov)
# Use: pytest --cov=app --cov-report=term-missing tests/
