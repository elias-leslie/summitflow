[pytest]
testpaths = tests
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests (require DB/network)
    e2e: marks tests as end-to-end tests

# Default options - skip slow and e2e tests by default
# Run e2e tests with: pytest -m e2e
# Run all tests with: pytest -m ""
addopts =
    -v
    --tb=short
    --strict-markers
    -m "not slow and not e2e"
    --cov=app
    --cov-fail-under=50
