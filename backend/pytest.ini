[pytest]
testpaths = tests
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Timeout (seconds) - prevents hanging tests
timeout = 30

# Markers
markers =
    unit: Unit tests (fast, isolated)
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests (require DB/network)
    e2e: marks tests as end-to-end tests

# Default options - skip slow and e2e tests by default
# Run e2e tests with: pytest -m e2e
# Run all tests with: pytest -m ""
addopts =
    -v
    --tb=short
    --strict-markers
    --strict-config
    -m "not slow and not e2e"
    --cov=app
    --cov-fail-under=35
    -p no:cacheprovider

# Ignore common deprecation warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
