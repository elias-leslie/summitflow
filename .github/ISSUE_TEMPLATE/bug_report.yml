name: Bug Report
description: Report a bug in SummitFlow
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. See error
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, browser, and how you deployed (local/Docker).
      placeholder: "e.g. Ubuntu 24.04, Chrome 130, local install"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste backend logs, browser console errors, or screenshots if applicable.
    validations:
      required: false
