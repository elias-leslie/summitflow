name: Build & Push Docker Images
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag override'
        required: false

permissions:
  contents: read
  packages: write

jobs:
  pack-workspace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: elias-leslie/agent-hub
          path: agent-hub-repo
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: pnpm/action-setup@b307475762933b98ed359c036b0e51f26b63b74b # v5.0.0
        with:
          version: "10.28.0"
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      - name: Pack workspace packages
        env:
          AGENT_HUB_ROOT: ${{ github.workspace }}/agent-hub-repo
        run: |
          mkdir -p /tmp/workspace-packages
          docker/scripts/pack-workspace-packages.sh /tmp/workspace-packages
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: workspace-packages
          path: /tmp/workspace-packages/*.tgz

  build:
    needs: pack-workspace
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - component: backend
            dockerfile: docker/backend.Dockerfile
            image-suffix: api
            needs-packages: false
          - component: frontend
            dockerfile: docker/frontend.Dockerfile
            image-suffix: web
            needs-packages: true
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - if: matrix.needs-packages
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: workspace-packages
          path: docker/workspace-packages
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/elias-leslie/summitflow-${{ matrix.image-suffix }}:latest
            ghcr.io/elias-leslie/summitflow-${{ matrix.image-suffix }}:${{ inputs.tag || github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  agent-browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: docker/agent-browser.Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/elias-leslie/agent-browser:latest
            ghcr.io/elias-leslie/agent-browser:${{ inputs.tag || github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
