name: Docker Integration Tests
on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1' # Weekly Monday 6am UTC

permissions:
  contents: read
  packages: read

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: elias-leslie/agent-hub
          path: agent-hub-repo
          token: ${{ secrets.AGENT_HUB_REPO_TOKEN }}
      - uses: pnpm/action-setup@b307475762933b98ed359c036b0e51f26b63b74b # v5.0.0
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Create .env file
        working-directory: docker/compose
        run: |
          cp .env.example .env

          set_env() {
            local key="$1"
            local value="$2"

            if grep -q "^${key}=" .env; then
              sed -i "s|^${key}=.*|${key}=${value}|" .env
            else
              printf '%s=%s\n' "$key" "$value" >> .env
            fi
          }

          set_env POSTGRES_PASSWORD test-integration-pw
          set_env SF_DB_PASSWORD test-sf-pw
          set_env AH_DB_PASSWORD test-ah-pw
          set_env PA_DB_PASSWORD test-pa-pw
          set_env REDIS_PASSWORD test-redis-pw
          set_env HOST_HOME_PATH "$HOME"
          set_env HATCHET_CLIENT_TOKEN ""
          set_env SUMMITFLOW_CLIENT_ID summitflow
          set_env SUMMITFLOW_CLIENT_SECRET test-summitflow-secret
          set_env TAG ci

      - name: Validate compose syntax
        working-directory: docker/compose
        run: docker compose --profile full config --quiet

      - name: Pack workspace packages
        env:
          AGENT_HUB_ROOT: ${{ github.workspace }}/agent-hub-repo
        run: docker/scripts/pack-workspace-packages.sh docker/workspace-packages

      - name: Build SummitFlow images
        run: |
          docker build -t ghcr.io/elias-leslie/summitflow-api:ci -f docker/backend.Dockerfile .
          docker build -t ghcr.io/elias-leslie/summitflow-web:ci -f docker/frontend.Dockerfile .

      - name: Start infrastructure
        working-directory: docker/compose
        run: docker compose --profile infra up -d --wait

      - name: Generate Hatchet client token
        run: docker/scripts/generate-hatchet-token.sh

      - name: Start SummitFlow stack
        working-directory: docker/compose
        run: docker compose --profile summitflow up -d --wait

      - name: Health check — SummitFlow API
        working-directory: docker/compose
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8001/health; then
              echo " OK"
              exit 0
            fi
            sleep 2
          done
          echo "Health check failed"
          docker compose --profile summitflow logs summitflow-api
          exit 1

      - name: Health check — SummitFlow Web
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:3001 > /dev/null; then
              echo "OK"
              exit 0
            fi
            sleep 2
          done
          echo "Health check failed"
          exit 1

      - name: Show container status
        if: always()
        working-directory: docker/compose
        run: docker compose --profile summitflow ps || true

      - name: Collect logs on failure
        if: failure()
        working-directory: docker/compose
        run: docker compose --profile summitflow logs --tail 100 || true

      - name: Tear down
        if: always()
        working-directory: docker/compose
        run: docker compose --profile summitflow down --volumes || true
