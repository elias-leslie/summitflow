name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
      - name: Install backend dependencies
        run: uv sync --all-extras --dev
      - name: Lint backend
        run: uv run ruff check .
      - name: Test backend
        run: uv run pytest
      - name: Build backend package
        run: uv build

  frontend:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/checkout@v5
        with:
          repository: elias-leslie/agent-hub
          path: agent-hub-repo
      - uses: pnpm/action-setup@v5
        with:
          version: 10.28.0
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
      - name: Pack Agent Hub workspace packages
        env:
          AGENT_HUB_ROOT: ${{ github.workspace }}/agent-hub-repo
        run: docker/scripts/pack-workspace-packages.sh docker/workspace-packages
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint frontend
        run: pnpm --filter summitflow-frontend lint
      - name: Typecheck frontend
        run: pnpm --filter summitflow-frontend exec tsc --noEmit
      - name: Test frontend
        run: pnpm --filter summitflow-frontend exec vitest run
      - name: Build frontend
        run: pnpm --filter summitflow-frontend build
