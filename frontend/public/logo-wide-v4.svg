<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 100" width="360" height="100">
  <!-- Version 4: Based on original logo-wide.svg with sun glow touching mountains -->

  <rect width="360" height="100" fill="#000000"/>

  <defs>
    <!-- Sun gradient -->
    <linearGradient id="outrunSun" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff200"/>
      <stop offset="50%" style="stop-color:#ff6600"/>
      <stop offset="100%" style="stop-color:#ff0066"/>
    </linearGradient>

    <!-- Sun glow - emanates from sun, fades outward -->
    <radialGradient id="sunGlow" cx="180" cy="55" r="60" gradientUnits="userSpaceOnUse">
      <stop offset="40%" style="stop-color:#ff6600; stop-opacity:0.22"/>
      <stop offset="70%" style="stop-color:#ff0066; stop-opacity:0.09"/>
      <stop offset="100%" style="stop-color:#ff0066; stop-opacity:0"/>
    </radialGradient>

    <!-- Clip to keep glow above ground -->
    <clipPath id="aboveGround">
      <rect x="0" y="0" width="360" height="70"/>
    </clipPath>
  </defs>

  <!-- Subtle stars - barely perceptible -->
  <g fill="#ffffff" opacity="0.15">
    <circle cx="45" cy="18" r="0.8"/>
    <circle cx="312" cy="12" r="0.6"/>
    <circle cx="28" cy="38" r="0.5"/>
    <circle cx="338" cy="32" r="0.7"/>
    <circle cx="72" cy="8" r="0.5"/>
    <circle cx="290" cy="22" r="0.6"/>
    <circle cx="15" cy="25" r="0.4"/>
    <circle cx="350" cy="18" r="0.5"/>
  </g>

  <!-- Sun glow layer (behind sun, clipped above ground) -->
  <ellipse cx="180" cy="55" rx="100" ry="60" fill="url(#sunGlow)" clip-path="url(#aboveGround)"/>

  <!-- Sun centered at 180 (original position) -->
  <circle cx="180" cy="55" r="25" fill="url(#outrunSun)"/>

  <!-- Sun scanlines (original positions) -->
  <g fill="#000000">
    <rect x="155" y="45" width="50" height="1.5"/>
    <rect x="155" y="50" width="50" height="2"/>
    <rect x="155" y="56" width="50" height="2.5"/>
    <rect x="155" y="62" width="50" height="3"/>
    <rect x="155" y="69" width="50" height="4"/>
  </g>

  <!-- Mountain range solid -->
  <polygon points="
    0,70
    20,60 50,65 80,50 110,65
    130,60 150,40 165,55 180,30 195,50 210,35 230,55
    250,50 280,65 310,55 340,65 360,60
    360,70
    0,70"
    fill="#1a0a2e"/>

  <!-- Infinite grid floor -->
  <g stroke="#ff0066" stroke-width="0.6">
    <!-- Horizontal lines -->
    <line x1="0" y1="72" x2="360" y2="72"/>
    <line x1="0" y1="78" x2="360" y2="78"/>
    <line x1="0" y1="86" x2="360" y2="86"/>
    <line x1="0" y1="96" x2="360" y2="96"/>

    <!-- Perspective lines - inner fan only (no outer edges) -->
    <line x1="180" y1="70" x2="90" y2="100"/>
    <line x1="180" y1="70" x2="135" y2="100"/>
    <line x1="180" y1="70" x2="225" y2="100"/>
    <line x1="180" y1="70" x2="270" y2="100"/>
  </g>
</svg>
