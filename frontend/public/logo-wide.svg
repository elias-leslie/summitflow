<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 100" width="360" height="100">
  <!-- Classic outrun style - matching logo.svg but wider -->

  <rect width="360" height="100" fill="#000000"/>

  <!-- Gradient sun (Exact copy of logo.svg colors) -->
  <defs>
    <linearGradient id="outrunSun" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff200"/>
      <stop offset="50%" style="stop-color:#ff6600"/>
      <stop offset="100%" style="stop-color:#ff0066"/>
    </linearGradient>
  </defs>

  <!-- Sun centered at 180 (middle of 360) -->
  <circle cx="180" cy="55" r="25" fill="url(#outrunSun)"/>

  <!-- Sun scanlines (Centered at 180, width 50) -->
  <g fill="#000000">
    <rect x="155" y="45" width="50" height="1.5"/>
    <rect x="155" y="50" width="50" height="2"/>
    <rect x="155" y="56" width="50" height="2.5"/>
    <rect x="155" y="62" width="50" height="3"/>
    <rect x="155" y="69" width="50" height="4"/>
  </g>

  <!-- Mountain range silhouette -->
  <!-- Central part (130-230) matches logo.svg exactly (shifted +130 x) -->
  <!-- Extensions to left (0-130) and right (230-360) -->
  <polygon points="
    0,70 
    20,60 50,65 80,50 110,65
    130,60 150,40 165,55 180,30 195,50 210,35 230,55 
    250,50 280,65 310,55 340,65 360,60
    360,70 
    0,70" 
    fill="#1a0a2e"/>

  <!-- Infinite grid floor -->
  <g stroke="#ff0066" stroke-width="0.6">
    <!-- Horizontal lines -->
    <line x1="0" y1="72" x2="360" y2="72"/>
    <line x1="0" y1="78" x2="360" y2="78"/>
    <line x1="0" y1="86" x2="360" y2="86"/>
    <line x1="0" y1="96" x2="360" y2="96"/>
    
    <!-- Perspective lines - Vanishing point at 180, 70 -->
    <!-- Central fan matching logo.svg style but wider fov -->
    <line x1="180" y1="70" x2="0" y2="100"/>
    <line x1="180" y1="70" x2="60" y2="100"/>
    <line x1="180" y1="70" x2="120" y2="100"/>
    <line x1="180" y1="70" x2="180" y2="100"/>
    <line x1="180" y1="70" x2="240" y2="100"/>
    <line x1="180" y1="70" x2="300" y2="100"/>
    <line x1="180" y1="70" x2="360" y2="100"/>
    
    <!-- Extra lines for density on edges -->
    <line x1="180" y1="70" x2="30" y2="100"/>
    <line x1="180" y1="70" x2="90" y2="100"/>
    <line x1="180" y1="70" x2="150" y2="100"/>
    <line x1="180" y1="70" x2="210" y2="100"/>
    <line x1="180" y1="70" x2="270" y2="100"/>
    <line x1="180" y1="70" x2="330" y2="100"/>
  </g>
</svg>
