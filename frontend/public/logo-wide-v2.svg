<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 100" width="360" height="100">
  <!-- Version 2: Sun clipped at horizon, road instead of grid rays -->

  <rect width="360" height="100" fill="#000000"/>

  <defs>
    <!-- Sun gradient -->
    <linearGradient id="outrunSun" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff200"/>
      <stop offset="50%" style="stop-color:#ff6600"/>
      <stop offset="100%" style="stop-color:#ff0066"/>
    </linearGradient>

    <!-- Clip path to hide sun below horizon -->
    <clipPath id="aboveHorizon">
      <rect x="0" y="0" width="360" height="70"/>
    </clipPath>
  </defs>

  <!-- Sun - clipped at horizon (y=70), raised to cy=50 -->
  <circle cx="180" cy="50" r="25" fill="url(#outrunSun)" clip-path="url(#aboveHorizon)"/>

  <!-- Sun scanlines - also clipped -->
  <g fill="#000000" clip-path="url(#aboveHorizon)">
    <rect x="155" y="40" width="50" height="1.5"/>
    <rect x="155" y="45" width="50" height="2"/>
    <rect x="155" y="51" width="50" height="2.5"/>
    <rect x="155" y="57" width="50" height="3"/>
    <rect x="155" y="64" width="50" height="4"/>
  </g>

  <!-- Mountain range - simplified to 5 dramatic peaks -->
  <polygon points="
    0,70
    30,65
    70,58
    100,45
    130,55
    150,48
    180,25
    210,48
    230,55
    260,42
    300,55
    330,62
    360,70
    360,70
    0,70"
    fill="#1a0a2e"/>

  <!-- Ground/road area -->
  <g stroke="#ff0066" stroke-width="0.6">
    <!-- Horizontal lines - perspective spacing -->
    <line x1="0" y1="72" x2="360" y2="72"/>
    <line x1="0" y1="78" x2="360" y2="78"/>
    <line x1="0" y1="86" x2="360" y2="86"/>
    <line x1="0" y1="96" x2="360" y2="96"/>
  </g>

  <!-- Road outline - two converging lines forming highway edges -->
  <!-- Vanishing point at (180, 70), road widens toward bottom -->
  <g stroke="#ff0066" stroke-width="1" fill="none" opacity="0.8">
    <!-- Left road edge -->
    <line x1="180" y1="70" x2="120" y2="100"/>
    <!-- Right road edge -->
    <line x1="180" y1="70" x2="240" y2="100"/>

    <!-- Optional: center dashed line for road feel -->
    <line x1="180" y1="70" x2="180" y2="100" stroke-dasharray="4,4" stroke-width="0.8"/>
  </g>

  <!-- Subtle lane markers -->
  <g stroke="#ff0066" stroke-width="0.4" opacity="0.5">
    <!-- Inner lane edges -->
    <line x1="180" y1="70" x2="150" y2="100"/>
    <line x1="180" y1="70" x2="210" y2="100"/>
  </g>
</svg>
