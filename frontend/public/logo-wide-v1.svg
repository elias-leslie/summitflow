<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 100" width="360" height="100">
  <!-- Version 1: Cleaned up aesthetic - dramatic mountains, angular grid -->

  <rect width="360" height="100" fill="#000000"/>

  <defs>
    <!-- Sun gradient -->
    <linearGradient id="outrunSun" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff200"/>
      <stop offset="50%" style="stop-color:#ff6600"/>
      <stop offset="100%" style="stop-color:#ff0066"/>
    </linearGradient>
  </defs>

  <!-- Sun - raised slightly to cy=50 -->
  <circle cx="180" cy="50" r="25" fill="url(#outrunSun)"/>

  <!-- Sun scanlines -->
  <g fill="#000000">
    <rect x="155" y="40" width="50" height="1.5"/>
    <rect x="155" y="45" width="50" height="2"/>
    <rect x="155" y="51" width="50" height="2.5"/>
    <rect x="155" y="57" width="50" height="3"/>
    <rect x="155" y="64" width="50" height="4"/>
  </g>

  <!-- Mountain range - simplified to 5 dramatic peaks -->
  <!-- Central peak frames the sun, secondary peaks on sides -->
  <polygon points="
    0,70
    30,65
    70,58
    100,45
    130,55
    150,48
    180,25
    210,48
    230,55
    260,42
    300,55
    330,62
    360,70
    360,70
    0,70"
    fill="#1a0a2e"/>

  <!-- Infinite grid floor -->
  <g stroke="#ff0066" stroke-width="0.6">
    <!-- Horizontal lines - perspective spacing -->
    <line x1="0" y1="72" x2="360" y2="72"/>
    <line x1="0" y1="78" x2="360" y2="78"/>
    <line x1="0" y1="86" x2="360" y2="86"/>
    <line x1="0" y1="96" x2="360" y2="96"/>

    <!-- Perspective lines - angular spacing from vanishing point (180, 70) -->
    <!-- Using angles: -75, -60, -45, -30, -15, 0, 15, 30, 45, 60, 75 degrees -->
    <!-- tan(angle) * 30 (height from 70 to 100) + 180 = x at y=100 -->
    <line x1="180" y1="70" x2="68" y2="100"/>   <!-- -75° -->
    <line x1="180" y1="70" x2="128" y2="100"/>  <!-- -60° -->
    <line x1="180" y1="70" x2="150" y2="100"/>  <!-- -45° -->
    <line x1="180" y1="70" x2="163" y2="100"/>  <!-- -30° -->
    <line x1="180" y1="70" x2="172" y2="100"/>  <!-- -15° -->
    <line x1="180" y1="70" x2="180" y2="100"/>  <!-- 0° (center) -->
    <line x1="180" y1="70" x2="188" y2="100"/>  <!-- 15° -->
    <line x1="180" y1="70" x2="197" y2="100"/>  <!-- 30° -->
    <line x1="180" y1="70" x2="210" y2="100"/>  <!-- 45° -->
    <line x1="180" y1="70" x2="232" y2="100"/>  <!-- 60° -->
    <line x1="180" y1="70" x2="292" y2="100"/>  <!-- 75° -->
  </g>
</svg>
