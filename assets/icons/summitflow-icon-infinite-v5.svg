<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Alternating fills - creates depth rhythm -->

  <!-- Stacked peaks alternating opacity -->
  <polygon points="50,15 52,19 48,19" fill="#06b6d4" opacity="0.15"/>
  <polygon points="50,18 55,25 45,25" fill="#0891b2" opacity="0.25"/>
  <polygon points="50,23 59,33 41,33" fill="#06b6d4" opacity="0.35"/>
  <polygon points="50,30 65,44 35,44" fill="#0891b2" opacity="0.50"/>
  <polygon points="50,38 72,56 28,56" fill="#06b6d4" opacity="0.65"/>
  <polygon points="50,47 80,70 20,70" fill="#0891b2" opacity="0.80"/>
  <polygon points="50,58 90,88 10,88" fill="#06b6d4"/>

  <!-- Subtle center line for depth -->
  <line x1="50" y1="15" x2="50" y2="58" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
</svg>
