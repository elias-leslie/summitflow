<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <filter id="glow4">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="100" height="100" fill="#02020a"/>

  <!-- Stacked infinite peaks - Tron style -->
  <g filter="url(#glow4)">
    <polygon points="50,8 52,12 48,12" fill="none" stroke="#00ffff" stroke-width="0.5" opacity="0.3"/>
    <polygon points="50,12 55,20 45,20" fill="none" stroke="#00ffff" stroke-width="0.6" opacity="0.4"/>
    <polygon points="50,18 60,30 40,30" fill="none" stroke="#00ffff" stroke-width="0.8" opacity="0.5"/>
    <polygon points="50,26 68,45 32,45" fill="none" stroke="#00ffff" stroke-width="1" opacity="0.65"/>
    <polygon points="50,36 78,62 22,62" fill="none" stroke="#00ffff" stroke-width="1.5" opacity="0.8"/>
    <polygon points="50,48 92,85 8,85" fill="none" stroke="#00ffff" stroke-width="2"/>
  </g>

  <!-- Vertical beam -->
  <line x1="50" y1="8" x2="50" y2="48" stroke="#ff00ff" stroke-width="1" opacity="0.5" filter="url(#glow4)"/>
</svg>
