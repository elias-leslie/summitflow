<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" shape-rendering="crispEdges">
  <!-- Cinemaware/Defender of the Crown style -->

  <!-- Warm sunset sky -->
  <rect x="0" y="0" width="100" height="20" fill="#ff4400"/>
  <rect x="0" y="20" width="100" height="20" fill="#ff6600"/>
  <rect x="0" y="40" width="100" height="20" fill="#ff8800"/>
  <rect x="0" y="60" width="100" height="40" fill="#442200"/>

  <!-- Pixelated sun disc -->
  <g fill="#ffff00">
    <rect x="40" y="25" width="20" height="4"/>
    <rect x="36" y="29" width="28" height="4"/>
    <rect x="36" y="33" width="28" height="4"/>
    <rect x="40" y="37" width="20" height="4"/>
  </g>

  <!-- Castle/mountain silhouette -->
  <g fill="#220000">
    <!-- Left tower -->
    <rect x="10" y="50" width="8" height="20"/>
    <rect x="8" y="48" width="12" height="4"/>
    <!-- Wall -->
    <rect x="18" y="55" width="20" height="15"/>
    <!-- Center keep -->
    <rect x="38" y="40" width="24" height="30"/>
    <rect x="42" y="32" width="16" height="10"/>
    <rect x="46" y="26" width="8" height="8"/>
    <!-- Right wall -->
    <rect x="62" y="55" width="20" height="15"/>
    <!-- Right tower -->
    <rect x="82" y="50" width="8" height="20"/>
    <rect x="80" y="48" width="12" height="4"/>
  </g>

  <!-- Ground texture -->
  <rect x="0" y="70" width="100" height="30" fill="#331100"/>
  <g fill="#442200">
    <rect x="5" y="75" width="10" height="3"/>
    <rect x="25" y="80" width="15" height="3"/>
    <rect x="55" y="77" width="12" height="3"/>
    <rect x="80" y="82" width="8" height="3"/>
  </g>
</svg>
