<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" shape-rendering="crispEdges">
  <!-- Shadow of the Beast style - parallax mountains -->

  <!-- Sky gradient via pixel rows -->
  <rect x="0" y="0" width="100" height="15" fill="#000044"/>
  <rect x="0" y="15" width="100" height="15" fill="#220066"/>
  <rect x="0" y="30" width="100" height="15" fill="#440088"/>
  <rect x="0" y="45" width="100" height="15" fill="#6600aa"/>
  <rect x="0" y="60" width="100" height="40" fill="#000000"/>

  <!-- Back mountain layer - 4px pixels -->
  <g fill="#330066">
    <rect x="0" y="48" width="4" height="12"/>
    <rect x="4" y="44" width="4" height="16"/>
    <rect x="8" y="40" width="4" height="20"/>
    <rect x="12" y="36" width="4" height="24"/>
    <rect x="16" y="40" width="4" height="20"/>
    <rect x="20" y="44" width="4" height="16"/>
    <rect x="24" y="48" width="4" height="12"/>
    <rect x="28" y="52" width="4" height="8"/>
    <rect x="32" y="48" width="4" height="12"/>
    <rect x="36" y="44" width="4" height="16"/>
    <rect x="40" y="40" width="4" height="20"/>
    <rect x="44" y="36" width="4" height="24"/>
    <rect x="48" y="32" width="4" height="28"/>
    <rect x="52" y="28" width="4" height="32"/>
    <rect x="56" y="32" width="4" height="28"/>
    <rect x="60" y="36" width="4" height="24"/>
    <rect x="64" y="40" width="4" height="20"/>
    <rect x="68" y="44" width="4" height="16"/>
    <rect x="72" y="48" width="4" height="12"/>
    <rect x="76" y="44" width="4" height="16"/>
    <rect x="80" y="40" width="4" height="20"/>
    <rect x="84" y="36" width="4" height="24"/>
    <rect x="88" y="40" width="4" height="20"/>
    <rect x="92" y="44" width="4" height="16"/>
    <rect x="96" y="48" width="4" height="12"/>
  </g>

  <!-- Front mountain - darker -->
  <g fill="#110033">
    <rect x="20" y="60" width="8" height="40"/>
    <rect x="28" y="56" width="8" height="44"/>
    <rect x="36" y="52" width="8" height="48"/>
    <rect x="44" y="48" width="8" height="52"/>
    <rect x="52" y="52" width="8" height="48"/>
    <rect x="60" y="56" width="8" height="44"/>
    <rect x="68" y="60" width="8" height="40"/>
  </g>

  <!-- Moon -->
  <rect x="78" y="10" width="8" height="8" fill="#ffff88"/>
</svg>
