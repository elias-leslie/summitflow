<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="peakGrad1" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f766e"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="flowGrad1" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Mountain Peak -->
  <polygon points="50,15 85,75 15,75" fill="url(#peakGrad1)"/>

  <!-- Flow Lines -->
  <path d="M 20,80 Q 30,60 35,55 Q 45,45 50,35"
        stroke="url(#flowGrad1)" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 12,70 Q 25,55 32,48 Q 42,38 48,28"
        stroke="url(#flowGrad1)" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M 28,85 Q 38,65 45,55 Q 52,45 55,38"
        stroke="url(#flowGrad1)" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>
</svg>
