<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="mountainGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f766e"/>
    </linearGradient>
    <linearGradient id="streamGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- Mountain -->
  <polygon points="50,12 88,72 12,72" fill="url(#mountainGrad)"/>

  <!-- Snow cap -->
  <polygon points="50,12 60,28 40,28" fill="#ffffff" opacity="0.9"/>

  <!-- Stream flowing from base -->
  <path d="M 50,72 Q 55,78 48,82 Q 40,86 50,90 Q 62,94 55,98"
        stroke="url(#streamGrad)" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- Stream highlight -->
  <path d="M 50,72 Q 55,78 48,82 Q 40,86 50,90 Q 62,94 55,98"
        stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.3"/>
</svg>
