<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="100" height="100" fill="#0a0a0f"/>

  <!-- Grid floor -->
  <g stroke="#00fff2" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="85" x2="100" y2="85"/>
    <line x1="0" y1="90" x2="100" y2="90"/>
    <line x1="0" y1="95" x2="100" y2="95"/>
    <line x1="50" y1="70" x2="0" y2="100"/>
    <line x1="50" y1="70" x2="100" y2="100"/>
    <line x1="50" y1="70" x2="25" y2="100"/>
    <line x1="50" y1="70" x2="75" y2="100"/>
  </g>

  <!-- Glowing mountain outlines -->
  <g filter="url(#glow1)">
    <polygon points="50,15 85,70 15,70" fill="none" stroke="#00fff2" stroke-width="2"/>
    <polygon points="50,25 75,65 25,65" fill="none" stroke="#00fff2" stroke-width="1.5" opacity="0.7"/>
    <polygon points="50,35 65,60 35,60" fill="none" stroke="#00fff2" stroke-width="1" opacity="0.5"/>
  </g>
</svg>
