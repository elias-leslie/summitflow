<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="sunsetGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b9d"/>
      <stop offset="30%" style="stop-color:#ff8c42"/>
      <stop offset="60%" style="stop-color:#ffd93d"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
  </defs>

  <!-- Sunset sky -->
  <rect width="100" height="100" fill="url(#sunsetGrad)"/>

  <!-- Sun with horizontal lines -->
  <circle cx="50" cy="45" r="20" fill="#ff2a6d"/>
  <g fill="#1a1a2e">
    <rect x="30" y="38" width="40" height="2"/>
    <rect x="30" y="43" width="40" height="2"/>
    <rect x="30" y="48" width="40" height="3"/>
    <rect x="30" y="54" width="40" height="4"/>
  </g>

  <!-- Mountain silhouette -->
  <polygon points="50,35 95,75 5,75" fill="#1a1a2e"/>
  <polygon points="25,50 50,75 0,75" fill="#2d1f3d" opacity="0.8"/>
  <polygon points="75,45 100,75 50,75" fill="#2d1f3d" opacity="0.8"/>

  <!-- Grid floor -->
  <g stroke="#ff2a6d" stroke-width="0.5" opacity="0.6">
    <line x1="0" y1="78" x2="100" y2="78"/>
    <line x1="0" y1="84" x2="100" y2="84"/>
    <line x1="0" y1="92" x2="100" y2="92"/>
    <line x1="50" y1="75" x2="0" y2="100"/>
    <line x1="50" y1="75" x2="100" y2="100"/>
    <line x1="50" y1="75" x2="20" y2="100"/>
    <line x1="50" y1="75" x2="80" y2="100"/>
  </g>
</svg>
