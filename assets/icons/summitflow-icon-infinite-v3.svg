<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Outline style - minimal, modern -->

  <!-- Stacked mountain outlines receding to infinity -->
  <polygon points="50,60 92,88 8,88" fill="none" stroke="#0891b2" stroke-width="2.5"/>
  <polygon points="50,50 80,75 20,75" fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.85"/>
  <polygon points="50,42 70,62 30,62" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.7"/>
  <polygon points="50,35 62,50 38,50" fill="none" stroke="#67e8f9" stroke-width="1.2" opacity="0.55"/>
  <polygon points="50,30 56,40 44,40" fill="none" stroke="#a5f3fc" stroke-width="1" opacity="0.4"/>
  <polygon points="50,26 53,32 47,32" fill="none" stroke="#cffafe" stroke-width="0.8" opacity="0.25"/>

  <!-- Vanishing point dot -->
  <circle cx="50" cy="22" r="2" fill="#06b6d4" opacity="0.6"/>
</svg>
