<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="tronGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffff"/>
      <stop offset="100%" style="stop-color:#0080ff"/>
    </linearGradient>
  </defs>

  <rect width="100" height="100" fill="#000008"/>

  <!-- Solid filled peak with glow edge -->
  <polygon points="50,10 90,80 10,80" fill="#000820" stroke="url(#tronGrad)" stroke-width="2.5" filter="url(#glow3)"/>

  <!-- Inner detail lines -->
  <g stroke="#00ffff" stroke-width="0.8" opacity="0.6" filter="url(#glow3)">
    <line x1="50" y1="10" x2="50" y2="55"/>
    <line x1="50" y1="55" x2="30" y2="80"/>
    <line x1="50" y1="55" x2="70" y2="80"/>
    <line x1="35" y1="50" x2="65" y2="50"/>
  </g>

  <!-- Apex glow point -->
  <circle cx="50" cy="10" r="3" fill="#00ffff" filter="url(#glow3)"/>
</svg>
