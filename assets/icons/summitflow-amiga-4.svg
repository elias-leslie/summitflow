<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" shape-rendering="crispEdges">
  <!-- Another World / Out of This World style - minimal, iconic -->

  <!-- Dark alien sky -->
  <rect width="100" height="100" fill="#000000"/>

  <!-- Distant planet/moon -->
  <g fill="#003366">
    <rect x="60" y="8" width="4" height="4"/>
    <rect x="56" y="12" width="12" height="4"/>
    <rect x="56" y="16" width="12" height="4"/>
    <rect x="60" y="20" width="4" height="4"/>
  </g>

  <!-- Infinite stacked mountains - pixel style -->
  <!-- Far (smallest) -->
  <g fill="#111122">
    <rect x="46" y="30" width="8" height="4"/>
  </g>

  <!-- Layer 2 -->
  <g fill="#181830">
    <rect x="42" y="34" width="16" height="4"/>
  </g>

  <!-- Layer 3 -->
  <g fill="#222244">
    <rect x="38" y="38" width="24" height="4"/>
  </g>

  <!-- Layer 4 -->
  <g fill="#2a2a55">
    <rect x="32" y="42" width="36" height="5"/>
  </g>

  <!-- Layer 5 -->
  <g fill="#333366">
    <rect x="24" y="47" width="52" height="6"/>
  </g>

  <!-- Layer 6 -->
  <g fill="#3d3d77">
    <rect x="14" y="53" width="72" height="7"/>
  </g>

  <!-- Front layer -->
  <g fill="#444488">
    <rect x="4" y="60" width="92" height="8"/>
  </g>

  <!-- Ground plane -->
  <rect x="0" y="68" width="100" height="32" fill="#222233"/>

  <!-- Ground detail pixels -->
  <g fill="#333344">
    <rect x="10" y="75" width="4" height="2"/>
    <rect x="30" y="80" width="6" height="2"/>
    <rect x="60" y="78" width="4" height="2"/>
    <rect x="85" y="82" width="5" height="2"/>
  </g>

  <!-- Highlight stars -->
  <g fill="#ffffff">
    <rect x="20" y="12" width="2" height="2"/>
    <rect x="80" y="25" width="2" height="2"/>
    <rect x="35" y="8" width="2" height="2"/>
    <rect x="90" y="15" width="2" height="2"/>
  </g>
</svg>
