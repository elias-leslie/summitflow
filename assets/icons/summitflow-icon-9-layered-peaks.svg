<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="peak1Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f766e"/>
      <stop offset="100%" style="stop-color:#134e4a"/>
    </linearGradient>
    <linearGradient id="peak2Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#0e7490"/>
    </linearGradient>
    <linearGradient id="peak3Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
  </defs>

  <!-- Back peak (leftmost, darkest) -->
  <polygon points="30,20 55,75 5,75" fill="url(#peak1Grad)" opacity="0.6"/>

  <!-- Middle peak -->
  <polygon points="50,15 80,75 20,75" fill="url(#peak2Grad)" opacity="0.8"/>

  <!-- Front peak (rightmost, brightest) -->
  <polygon points="70,25 95,75 45,75" fill="url(#peak3Grad)"/>

  <!-- Connecting flow curve -->
  <path d="M 30,20 Q 40,18 50,15 Q 60,20 70,25"
        stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>

  <!-- Flow underline -->
  <path d="M 10,80 Q 50,72 90,80"
        stroke="#06b6d4" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>
</svg>
