<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" shape-rendering="crispEdges">
  <!-- Amiga 16-color palette style, chunky pixels -->

  <rect width="100" height="100" fill="#000088"/>

  <!-- Pixel grid mountain - 5px blocks -->
  <!-- Row 1 - peak -->
  <rect x="45" y="15" width="10" height="5" fill="#ffffff"/>

  <!-- Row 2 -->
  <rect x="40" y="20" width="20" height="5" fill="#aaaaaa"/>

  <!-- Row 3 -->
  <rect x="35" y="25" width="30" height="5" fill="#888888"/>

  <!-- Row 4 -->
  <rect x="30" y="30" width="40" height="5" fill="#666666"/>

  <!-- Row 5 -->
  <rect x="25" y="35" width="50" height="5" fill="#00aa00"/>

  <!-- Row 6 -->
  <rect x="20" y="40" width="60" height="5" fill="#008800"/>

  <!-- Row 7 -->
  <rect x="15" y="45" width="70" height="5" fill="#006600"/>

  <!-- Row 8 -->
  <rect x="10" y="50" width="80" height="5" fill="#004400"/>

  <!-- Row 9-10 - base -->
  <rect x="5" y="55" width="90" height="5" fill="#442200"/>
  <rect x="0" y="60" width="100" height="5" fill="#331100"/>

  <!-- Ground -->
  <rect x="0" y="65" width="100" height="35" fill="#553300"/>

  <!-- Sun pixel -->
  <rect x="75" y="8" width="10" height="10" fill="#ffff00"/>
</svg>
