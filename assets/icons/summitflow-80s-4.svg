<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Classic outrun style -->

  <rect width="100" height="100" fill="#000000"/>

  <!-- Gradient sun -->
  <defs>
    <linearGradient id="outrunSun" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff200"/>
      <stop offset="50%" style="stop-color:#ff6600"/>
      <stop offset="100%" style="stop-color:#ff0066"/>
    </linearGradient>
  </defs>

  <circle cx="50" cy="55" r="25" fill="url(#outrunSun)"/>

  <!-- Sun scanlines -->
  <g fill="#000000">
    <rect x="25" y="45" width="50" height="1.5"/>
    <rect x="25" y="50" width="50" height="2"/>
    <rect x="25" y="56" width="50" height="2.5"/>
    <rect x="25" y="62" width="50" height="3"/>
    <rect x="25" y="69" width="50" height="4"/>
  </g>

  <!-- Mountain range silhouette -->
  <polygon points="0,60 20,40 35,55 50,30 65,50 80,35 100,55 100,70 0,70" fill="#1a0a2e"/>

  <!-- Infinite grid floor -->
  <g stroke="#ff0066" stroke-width="0.6">
    <line x1="0" y1="72" x2="100" y2="72"/>
    <line x1="0" y1="78" x2="100" y2="78"/>
    <line x1="0" y1="86" x2="100" y2="86"/>
    <line x1="0" y1="96" x2="100" y2="96"/>
    <line x1="50" y1="70" x2="0" y2="100"/>
    <line x1="50" y1="70" x2="100" y2="100"/>
    <line x1="50" y1="70" x2="25" y2="100"/>
    <line x1="50" y1="70" x2="75" y2="100"/>
    <line x1="50" y1="70" x2="10" y2="100"/>
    <line x1="50" y1="70" x2="90" y2="100"/>
  </g>
</svg>
