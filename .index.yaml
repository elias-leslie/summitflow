project: summitflow
generated_at: 2026-02-15 22:06 UTC
environment:
  python_version: '>=3.13'
  venv_path: backend/.venv
  package_manager: npm
services:
  backend_port: 8001
  frontend_port: 3001
  infrastructure:
    neo4j: 7687
    postgres: 5432
    redis: 6379
cli:
  primary_command: st
  help_command: st --help
  common_commands:
  - 'st work <task-id>  # Set active task context'
  - 'st context         # Show current task details'
  - 'st step pass <subtask> <N>  # Mark step as passed'
  - 'st subtask pass    # Mark subtask as passed'
  - 'st done <task-id>  # Complete task (merge + cleanup)'
